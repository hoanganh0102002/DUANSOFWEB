<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0e2a47"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <rect id="card" width="200" height="240" rx="20"/>
  </defs>
  <rect width="800" height="500" fill="url(#bg)"/>
  
  <!-- Hologram HUD background -->
  <g stroke="#3b82f6" opacity="0.3" fill="none">
    <path d="M 100 100 L 700 100 M 100 200 L 700 200 M 100 300 L 700 300 M 100 400 L 700 400" stroke-width="1"/>
    <path d="M 50 250 L 750 250" stroke-width="2" stroke-dasharray="10,10"/>
  </g>
  
  <!-- Transparent glass panel -->
  <g transform="translate(300, 100)">
    <rect width="360" height="260" fill="rgba(59, 130, 246, 0.1)" stroke="#60a5fa" stroke-width="2" rx="16" filter="drop-shadow(0 0 10px rgba(96,165,250,0.5))"/>
    <text x="180" y="50" font-family="sans-serif" font-weight="bold" font-size="28" fill="#93c5fd" text-anchor="middle" letter-spacing="4">BANKING</text>
    
    <!-- Bank Icon -->
    <path d="M 180 80 L 120 120 L 240 120 Z" fill="none" stroke="#fff" stroke-width="4" stroke-linejoin="round"/>
    <rect x="130" y="130" width="20" height="60" fill="none" stroke="#fff" stroke-width="4"/>
    <rect x="170" y="130" width="20" height="60" fill="none" stroke="#fff" stroke-width="4"/>
    <rect x="210" y="130" width="20" height="60" fill="none" stroke="#fff" stroke-width="4"/>
    <rect x="110" y="200" width="140" height="20" fill="none" stroke="#fff" stroke-width="4"/>
  </g>

  <!-- Businessman pointing abstract -->
  <path d="M 0 500 L 150 250 L 240 280 L 300 150 L 280 180" fill="none" stroke="#1e40af" stroke-width="60" stroke-linecap="round"/>
  <circle cx="300" cy="150" r="20" fill="#60a5fa" filter="drop-shadow(0 0 15px #60a5fa)"/>
</svg>
