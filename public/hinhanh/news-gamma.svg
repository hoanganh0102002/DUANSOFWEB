<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="gammaGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fb7185" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#d946ef" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="1"/>
    </radialGradient>
    <linearGradient id="btn" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#9333ea"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="#0f172a"/>
  
  <!-- Glowing center -->
  <circle cx="400" cy="250" r="300" fill="url(#gammaGlow)" filter="blur(20px)"/>
  
  <!-- Texts -->
  <text x="150" y="160" font-family="'Segoe UI', sans-serif" font-weight="bold" font-size="16" fill="#cbd5e1">Welcome to Gamma</text>
  <text x="150" y="220" font-family="'Georgia', serif" font-weight="bold" font-size="48" fill="#fff">What do you want to make?</text>
  
  <!-- Input box -->
  <rect x="150" y="280" width="500" height="60" fill="rgba(15, 23, 42, 0.6)" stroke="rgba(255,255,255,0.2)" stroke-width="1" rx="8"/>
  <text x="180" y="316" font-family="'Segoe UI', sans-serif" font-size="18" fill="#94a3b8">A pitch deck for building a colony on Mars...</text>
  
  <!-- Generate Button -->
  <rect x="520" y="285" width="120" height="50" fill="url(#btn)" rx="6"/>
  <text x="580" y="316" font-family="'Segoe UI', sans-serif" font-weight="bold" font-size="16" fill="#fff" text-anchor="middle">Generate</text>
</svg>
