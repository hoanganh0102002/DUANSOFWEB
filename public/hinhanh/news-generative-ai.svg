<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="1"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
  </defs>
  <rect width="800" height="500" fill="url(#glow)"/>
  
  <text x="400" y="100" font-family="sans-serif" font-weight="900" font-size="64" fill="rgba(255,255,255,0.1)" text-anchor="middle" letter-spacing="10">GENERATIVE</text>
  
  <circle cx="400" cy="250" r="80" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.5"/>
  <circle cx="400" cy="250" r="100" fill="none" stroke="#60a5fa" stroke-width="1" stroke-dasharray="10,5" opacity="0.8">
    <animateTransform attributeName="transform" type="rotate" from="0 400 250" to="360 400 250" dur="20s" repeatCount="indefinite"/>
  </circle>
  
  <rect x="330" y="200" width="140" height="100" fill="none" stroke="#fff" stroke-width="3" rx="10"/>
  <text x="400" y="270" font-family="sans-serif" font-weight="bold" font-size="56" fill="#fff" text-anchor="middle">AI</text>
  
  <!-- Hands abstract -->
  <path d="M 200 400 Q 400 300 600 400" fill="none" stroke="#1d4ed8" stroke-width="4" opacity="0.5" filter="url(#blur)"/>
  <path d="M 250 450 Q 400 350 550 450" fill="none" stroke="#3b82f6" stroke-width="2" opacity="0.8"/>
  
  <circle cx="400" cy="250" r="150" fill="url(#glow)" stroke="none" opacity="0.4" filter="url(#blur)"/>
</svg>
