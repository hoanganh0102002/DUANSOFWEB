<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="orgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="50%" stop-color="#ea580c"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#orgGrad)"/>
  
  <!-- Dash connections -->
  <line x1="100" y1="250" x2="700" y2="250" stroke="#fff" stroke-width="4" stroke-dasharray="10, 10"/>
  
  <path d="M 200 150 L 600 150 L 600 350 L 200 350 Z" fill="none" stroke="#fff" stroke-width="4" stroke-dasharray="15, 10" opacity="0.6"/>

  <text x="400" y="130" font-family="sans-serif" font-weight="900" font-size="42" fill="#fff" text-anchor="middle" letter-spacing="4">MIDDLEWARE</text>
  
  <!-- Left APP -->
  <circle cx="400" cy="250" r="120" fill="#fff" filter="drop-shadow(0 10px 15px rgba(0,0,0,0.3))"/>
  <circle cx="400" cy="250" r="110" fill="none" stroke="#ea580c" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="400" y="260" font-family="sans-serif" font-weight="800" font-size="36" fill="#ea580c" text-anchor="middle">APP</text>

  <!-- Request -->
  <text x="150" y="260" font-family="sans-serif" font-weight="bold" font-size="28" fill="#fff" text-anchor="middle">REQUEST</text>
  <!-- Response -->
  <text x="650" y="260" font-family="sans-serif" font-weight="bold" font-size="28" fill="#fff" text-anchor="middle">RESPONSE</text>
  
  <!-- Left Arrow -->
  <polygon points="300,240 320,250 300,260" fill="#fff"/>
  <!-- Right Arrow -->
  <polygon points="500,240 480,250 500,260" fill="#fff"/>

</svg>
