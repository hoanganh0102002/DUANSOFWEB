<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <radialGradient id="ringBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#083344" stop-opacity="1"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
  </defs>
  <rect width="800" height="500" fill="url(#ringBg)"/>
  
  <!-- Connecting lines -->
  <path d="M 200 250 L 600 250 M 400 100 L 400 400 M 260 110 L 540 390 M 260 390 L 540 110" fill="none" stroke="#0ea5e9" stroke-width="2" opacity="0.3" stroke-dasharray="5,5"/>
  
  <!-- Outer nodes -->
  <g fill="none" stroke="#38bdf8" stroke-width="3">
    <circle cx="200" cy="250" r="30"/>
    <circle cx="600" cy="250" r="40" stroke="#0ea5e9"/>
    <circle cx="400" cy="100" r="25"/>
    <circle cx="400" cy="400" r="35"/>
    <circle cx="260" cy="110" r="20"/>
    <circle cx="540" cy="390" r="28"/>
    <circle cx="260" cy="390" r="32"/>
    <circle cx="540" cy="110" r="22"/>
  </g>
  
  <!-- Center circle -->
  <circle cx="400" cy="250" r="80" fill="#0369a1" stroke="#38bdf8" stroke-width="4"/>
  <circle cx="400" cy="250" r="90" fill="none" stroke="#7dd3fc" stroke-width="1" stroke-dasharray="10, 4" opacity="0.8"/>
  
  <text x="400" y="260" font-family="sans-serif" font-weight="900" font-size="24" fill="#fff" text-anchor="middle" letter-spacing="2">MARTECH</text>

  <!-- Decorative icons inside nodes (abstract) -->
  <circle cx="200" cy="250" r="10" fill="#38bdf8"/>
  <circle cx="600" cy="250" r="15" fill="#0ea5e9"/>
  <rect x="390" y="390" width="20" height="20" fill="#38bdf8"/>
  <path d="M 390 100 L 410 100 L 400 85 Z" fill="#38bdf8"/>
</svg>
