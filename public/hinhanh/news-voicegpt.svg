<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bgVoice" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#4c1d95"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bgVoice)"/>
  
  <!-- Phone outline right side -->
  <rect x="500" y="50" width="220" height="400" fill="#1f2937" rx="30" stroke="#374151" stroke-width="8"/>
  <rect x="510" y="60" width="200" height="380" fill="#111827" rx="20"/>
  
  <!-- Phone Voice wave pattern -->
  <g fill="#f3f4f6">
    <rect x="530" y="200" width="20" height="40" rx="10"/>
    <rect x="560" y="180" width="20" height="80" rx="10"/>
    <rect x="590" y="160" width="20" height="120" rx="10"/>
    <rect x="620" y="190" width="20" height="60" rx="10"/>
    <rect x="650" y="210" width="20" height="20" rx="10"/>
  </g>
  <text x="610" y="320" font-family="sans-serif" font-size="14" fill="#9ca3af" text-anchor="middle">Tap to interrupt</text>
  <path d="M 580 400 L 640 400" stroke="#4b5563" stroke-width="4" stroke-linecap="round"/>

  <!-- Left side Text -->
  <rect x="80" y="220" width="10" height="40" fill="#fff" rx="5"/>
  <rect x="100" y="200" width="10" height="80" fill="#fff" rx="5"/>
  <text x="130" y="250" font-family="sans-serif" font-weight="bold" font-size="48" fill="#fff">VoiceGPT</text>
  
  <text x="130" y="100" font-family="sans-serif" font-size="16" fill="#9ca3af">OpenAI</text>
</svg>
